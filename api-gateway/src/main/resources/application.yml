server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**
            - id: profile-service
              uri: http://localhost:8082
              predicates:
                - Path=/profile/**
            - id: product-service
              uri: http://localhost:8083
              predicates:
                - Path=/product/**
jwt:
  secret: ${SECRET_KEY}